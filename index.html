<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0f6e56;
    --green-light: #1D9E75;
    --green-pale: #e1f5ee;
    --green-mid: #9FE1CB;
    --amber: #BA7517;
    --amber-pale: #FAEEDA;
    --blue: #185FA5;
    --blue-pale: #E6F1FB;
    --red-pale: #FCEBEB;
    --red: #791F1F;
    --gray-50: #f8f7f4;
    --gray-100: #f0ede8;
    --gray-200: #e0dcd4;
    --gray-400: #9e9a93;
    --gray-600: #5f5c56;
    --gray-800: #2c2a26;
    --text: #1a1916;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--gray-50);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    background: var(--green);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: white;
    letter-spacing: 0.01em;
  }
  .topbar-logo span {
    color: var(--green-mid);
  }

  /* HERO */
  .hero {
    background: var(--green);
    padding: 3rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 48px;
    background: var(--gray-50);
    border-radius: 48px 48px 0 0;
  }
  .hero-inner {
    max-width: 680px;
    margin: 0 auto;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green-mid);
    margin-bottom: 12px;
  }
  .hero-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 40px);
    color: white;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .hero-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
    max-width: 480px;
  }

  /* PROGRESS */
  .progress-section {
    max-width: 680px;
    margin: 2rem auto 0;
    padding: 0 2rem;
  }
  .progress-card {
    background: white;
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    border: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .progress-text { flex: 1; }
  .progress-label {
    font-size: 13px;
    color: var(--gray-600);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 6px;
    background: var(--gray-100);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green-light);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-count {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--green);
    white-space: nowrap;
    line-height: 1;
  }
  .progress-count span {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--gray-400);
    font-weight: 400;
  }

  /* STEPS */
  .steps-section {
    max-width: 680px;
    margin: 1.5rem auto 4rem;
    padding: 0 2rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .step {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .step.is-done {
    border-color: var(--green-light);
  }
  .step.is-open {
    box-shadow: 0 4px 20px rgba(15, 110, 86, 0.08);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .step-header:hover { background: var(--gray-50); }

  .step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
    background: var(--gray-100);
    color: var(--gray-600);
    transition: all 0.25s;
  }
  .step.is-done .step-num {
    background: var(--green-light);
    color: white;
  }

  .step-info { flex: 1; min-width: 0; }
  .step-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: color 0.2s;
    line-height: 1.4;
  }
  .step.is-done .step-name {
    color: var(--gray-400);
    text-decoration: line-through;
  }
  .step-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 4px;
  }
  .tag-must { background: var(--red-pale); color: var(--red); }
  .tag-watch { background: var(--blue-pale); color: var(--blue); }
  .tag-do { background: var(--green-pale); color: var(--green); }
  .tag-soon { background: var(--amber-pale); color: var(--amber); }

  .step-chevron {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-400);
    transition: transform 0.25s;
  }
  .step.is-open .step-chevron { transform: rotate(180deg); }

  .step-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .step-body-inner {
    padding: 0 16px 16px 62px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .step-desc {
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.7;
  }

  .step-links {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .step-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--green);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s;
  }
  .step-link:hover { color: var(--green-light); }
  .step-link-icon {
    width: 16px;
    height: 16px;
    background: var(--green-pale);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
  }

  .sub-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
  .sub-step { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px 12px; }
  .sub-step-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .sub-step-order { font-size: 10px; font-weight: 500; background: var(--green-pale); color: var(--green); border-radius: 20px; padding: 2px 8px; }
  .sub-step-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .sub-step-why { font-size: 12px; color: var(--gray-600); line-height: 1.6; margin-bottom: 4px; }
  .sub-step-result { font-size: 12px; color: var(--green); font-weight: 500; }
  .sub-step-result::before { content: "→ "; }

  .step-pending-note {
    font-size: 12px;
    color: var(--amber);
    background: var(--amber-pale);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    line-height: 1.5;
  }

  .mark-btn {
    align-self: flex-start;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-200);
    background: transparent;
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.18s;
  }
  .mark-btn:hover {
    border-color: var(--green-light);
    color: var(--green);
    background: var(--green-pale);
  }
  .mark-btn.is-done-btn {
    border-color: var(--green-light);
    color: var(--green);
    background: var(--green-pale);
  }

  /* DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0 2px;
  }
  .section-divider-line {
    flex: 1;
    height: 1px;
    background: var(--gray-200);
  }
  .section-divider-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: var(--gray-400);
  }

  @media (max-width: 480px) {
    .hero { padding: 2rem 1.25rem 3.5rem; }
    .progress-section, .steps-section { padding: 0 1rem; }
    .step-body-inner { padding-left: 16px; }
    .progress-card { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  }
</style>
</head>

      { url: "https://drive.google.com/file/d/1lhztSdRzpwndEDkTZaHk28g1If5iIzz3/view?usp=sharing", txt: "Reunião closer — gravação 4" }
    ]
  },
  {
    name: "Lição de cadência — gravar vídeo curto",
    tag: "do", tagTxt: "praticar",
    desc: "Gravar um vídeo curto (2–3 min) mostrando a cadência no Pipedrive e ChatWoot em tempo real: abrir filtro de turno, clicar no lead, verificar ChatWoot, ticar atividade e avançar. Objetivo: fixar o fluxo padrão antes da primeira ligação real.",
    links: [],
    subSteps: [
      { order: "1", title: "Abrir filtro de turno no Pipedrive", why: "BASE ou CADÊNCIA dependendo do turno. Mostrar os dois filtros e explicar quando cada um se aplica.", result: "SDR sabe qual filtro abrir sem precisar consultar." },
      { order: "2", title: "Demonstrar o fluxo de uma atividade", why: "Clicar no lead → ligar → abrir ChatWoot → conferir se mensagem foi → ticar atividade → próximo. Mostrar isso ao vivo.", result: "Fluxo de 5 passos internalizado antes da primeira ligação." }
    ]
  },
  {
    name: "Primeiras ligações — 30 leads com a Daiane",
    tag: "do", tagTxt: "praticar",
    desc: "30 leads liberados por SDR para as primeiras ligações reais. Seguir o script 100% — sem improvisar ainda. Após a rodada, a Daiane e o time ouvirão as ligações juntos e darão feedback em tempo real.",
    links: [],
    subSteps: [
      { order: "Regra", title: "Script 100% — sem desvio", why: "A primeira rodada é de calibração, não de resultado. Só é possível dar feedback preciso se o SDR seguiu o script. Quem improvisa não sabe o que errou.", result: "Foque na estrutura: N → A + CNPJ → B → T → agendamento." },
      { order: "Depois", title: "Escuta conjunta com a Daiane", why: "Cada ligação será analisada: o que travou, onde o BANT foi perdido, como a objeção poderia ter sido tratada.", result: "O feedback em tempo real é o treinamento mais rápido que existe." }
    ]
  }
];

const TAG_CLS = { must: "tag-must", watch: "tag-watch", do: "tag-do", soon: "tag-soon" };
const LINK_ICON = "↗";

const TOTAL = 15;
let done = JSON.parse(localStorage.getItem("podium-onboarding-done") || "null");
if (!done || done.length !== TOTAL) { done = new Array(TOTAL).fill(false); localStorage.setItem("podium-onboarding-done", JSON.stringify(done)); }
let openIdx = -1;

function save() {
  try { localStorage.setItem("podium-onboarding-done", JSON.stringify(done)); } catch(e) {}
}

function updateProgress() {
  const n = done.filter(Boolean).length;
  const pct = Math.round(n / TOTAL * 100);
  document.getElementById("prog-label").textContent = n + " de " + TOTAL + " etapas concluídas";
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-count").innerHTML = n + ' <span>/ ' + TOTAL + '</span>';
}

function renderSteps() {
  const container = document.getElementById("steps-container");
  container.innerHTML = "";

  const groups = [
    { label: "Produto e ecossistema", indices: [0, 1, 2, 3] },
    { label: "Ferramentas e operação", indices: [4, 5, 6, 7, 8, 9] },
    { label: "Imersão em campo", indices: [10, 11, 12, 13, 14] }
  ];

  groups.forEach(group => {
    const div = document.createElement("div");
    div.className = "section-divider";
    div.innerHTML = '<div class="section-divider-line"></div><span class="section-divider-label">' + group.label + '</span><div class="section-divider-line"></div>';
    container.appendChild(div);

    group.indices.forEach(i => {
      const s = STEPS[i];
      const card = document.createElement("div");
      card.className = "step" + (done[i] ? " is-done" : "") + (openIdx === i ? " is-open" : "");

      const hdr = document.createElement("div");
      hdr.className = "step-header";
      hdr.setAttribute("role", "button");
      hdr.setAttribute("aria-expanded", openIdx === i ? "true" : "false");

      const numEl = document.createElement("div");
      numEl.className = "step-num";
      numEl.textContent = done[i] ? "✓" : (i + 1);

      const info = document.createElement("div");
      info.className = "step-info";

      const name = document.createElement("div");
      name.className = "step-name";
      name.textContent = s.name;

      const tag = document.createElement("span");
      tag.className = "step-tag " + TAG_CLS[s.tag];
      tag.textContent = s.tagTxt;

      info.appendChild(name);
      info.appendChild(tag);

      const chevron = document.createElement("div");
      chevron.className = "step-chevron";
      chevron.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      hdr.appendChild(numEl);
      hdr.appendChild(info);
      hdr.appendChild(chevron);

      const body = document.createElement("div");
      body.className = "step-body";

      const inner = document.createElement("div");
      inner.className = "step-body-inner";

      const desc = document.createElement("p");
      desc.className = "step-desc";
      desc.textContent = s.desc;
      inner.appendChild(desc);

      if (s.subSteps) {
        const subDiv = document.createElement("div");
        subDiv.className = "sub-steps";
        s.subSteps.forEach(sub => {
          const subCard = document.createElement("div");
          subCard.className = "sub-step";
          subCard.innerHTML = '<div class="sub-step-hdr"><span class="sub-step-order">' + sub.order + '</span><span class="sub-step-title">' + sub.title + '</span></div><p class="sub-step-why">' + sub.why + '</p><p class="sub-step-result">' + sub.result + '</p>';
          subDiv.appendChild(subCard);
        });
        inner.appendChild(subDiv);
      }

      if (s.links && s.links.length > 0) {
        const linksDiv = document.createElement("div");
        linksDiv.className = "step-links";
        s.links.forEach(l => {
          const a = document.createElement("a");
          a.className = "step-link";
          a.href = l.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.innerHTML = '<span class="step-link-icon">' + LINK_ICON + '</span>' + l.txt;
          linksDiv.appendChild(a);
        });
        inner.appendChild(linksDiv);
      }

      if (s.pending) {
        const note = document.createElement("div");
        note.className = "step-pending-note";
        note.textContent = "Os vídeos serão adicionados assim que gravados. Aguarde a notificação da liderança.";
        inner.appendChild(note);
      } else {
        const btn = document.createElement("button");
        btn.className = "mark-btn" + (done[i] ? " is-done-btn" : "");
        btn.textContent = done[i] ? "✓ Concluído — desfazer" : "Marcar como concluído";
        btn.addEventListener("click", function(e) {
          e.stopPropagation();
          done[i] = !done[i];
          save();
          updateProgress();
          renderSteps();
        });
        inner.appendChild(btn);
      }

      body.appendChild(inner);

      if (openIdx === i) {
        body.style.maxHeight = "600px";
      }

      hdr.addEventListener("click", function() {
        openIdx = openIdx === i ? -1 : i;
        renderSteps();
      });

      card.appendChild(hdr);
      card.appendChild(body);
      container.appendChild(card);
    });
  });

  updateProgress();
}

renderSteps();
</script>
